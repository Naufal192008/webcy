<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - WebPro UMKM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .payment-card {
            cursor: pointer;
            border: 3px solid #ddd;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }
        .payment-card:hover, .payment-card.selected {
            border-color: #0d6efd;
            background: #f0f7ff;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-globe"></i> WebPro UMKM
            </a>
            <div class="ms-auto text-white">
                <span id="userDisplay"></span>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="mb-4"><i class="fas fa-shopping-cart"></i> Checkout</h2>
        
        <!-- Order Summary -->
        <div class="card mb-4">
            <div class="card-header bg-white"><h5>Ringkasan Pesanan</h5></div>
            <div class="card-body" id="orderSummary">
                <p>Loading...</p>
            </div>
        </div>

        <!-- Payment Method -->
        <div class="card mb-4">
            <div class="card-header bg-white"><h5>Pilih Metode Pembayaran</h5></div>
            <div class="card-body">
                <div class="row g-3" id="paymentMethods">
                    <div class="col-6 col-md-3">
                        <div class="payment-card" onclick="selectPayment('dana', this)">
                            <i class="fas fa-wallet fa-2x text-info"></i>
                            <h5 class="mt-2">DANA</h5>
                            <small>085710785244</small>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="payment-card" onclick="selectPayment('ovo', this)">
                            <i class="fas fa-mobile-alt fa-2x text-purple"></i>
                            <h5 class="mt-2">OVO</h5>
                            <small>085710785244</small>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="payment-card" onclick="selectPayment('gopay', this)">
                            <i class="fas fa-google-wallet fa-2x text-success"></i>
                            <h5 class="mt-2">GoPay</h5>
                            <small>085710785244</small>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="payment-card" onclick="selectPayment('qris', this)">
                            <i class="fas fa-qrcode fa-2x text-warning"></i>
                            <h5 class="mt-2">QRIS</h5>
                            <small>Scan QR</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Total -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <h4>Total:</h4>
                    <h4 class="text-primary" id="totalPrice">Rp 0</h4>
                </div>
            </div>
        </div>

        <button class="btn btn-primary btn-lg w-100" onclick="processCheckout()">
            <i class="fas fa-lock"></i> Bayar Sekarang
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <script>
        let selectedPayment = '';
        let currentUser = null;

        // Cek login - TAPI JANGAN REDIRECT
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userDisplay').textContent = 
                    '👤 ' + (user.displayName || user.email);
                loadCart();
            } else {
                // Tampilkan pesan, jangan redirect
                document.getElementById('userDisplay').textContent = '❌ Belum login';
                document.getElementById('orderSummary').innerHTML = 
                    '<div class="alert alert-warning">Silakan <a href="login.html">login</a> terlebih dahulu untuk checkout.</div>';
            }
        });

        function loadCart() {
            const db = firebase.firestore();
            db.collection('carts').doc(currentUser.uid).get()
                .then((doc) => {
                    const container = document.getElementById('orderSummary');
                    if (!doc.exists || !doc.data().items || doc.data().items.length === 0) {
                        container.innerHTML = '<p class="text-muted">Keranjang kosong. <a href="index.html">Belanja dulu</a></p>';
                        document.getElementById('totalPrice').textContent = 'Rp 0';
                        return;
                    }
                    
                    const items = doc.data().items;
                    let total = 0;
                    let html = '';
                    
                    items.forEach((item, index) => {
                        const price = item.price - (item.price * (item.discount || 0) / 100);
                        const subtotal = price * item.quantity;
                        total += subtotal;
                        html += `
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <div>
                                    <strong>${item.name}</strong>
                                    <small class="text-muted">x${item.quantity}</small>
                                </div>
                                <span>Rp ${subtotal.toLocaleString('id-ID')}</span>
                            </div>
                        `;
                    });
                    
                    container.innerHTML = html;
                    document.getElementById('totalPrice').textContent = 
                        'Rp ' + total.toLocaleString('id-ID');
                })
                .catch((err) => {
                    console.error('Error loading cart:', err);
                });
        }

        function selectPayment(method, element) {
            selectedPayment = method;
            document.querySelectorAll('.payment-card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
        }

        function processCheckout() {
            if (!currentUser) {
                Swal.fire('Login Dulu', 'Silakan login terlebih dahulu', 'warning');
                return;
            }
            
            if (!selectedPayment) {
                Swal.fire('Pilih Pembayaran', 'Silakan pilih metode pembayaran', 'warning');
                return;
            }

            const totalText = document.getElementById('totalPrice').textContent;
            const total = parseInt(totalText.replace(/[^0-9]/g, ''));

            if (total === 0) {
                Swal.fire('Keranjang Kosong', 'Tambahkan produk dulu', 'warning');
                return;
            }

            // Simpan order
            const db = firebase.firestore();
            db.collection('orders').add({
                userId: currentUser.uid,
                userName: currentUser.displayName || currentUser.email,
                userEmail: currentUser.email,
                totalPrice: total,
                paymentMethod: selectedPayment,
                paymentNumber: '085710785244',
                status: 'pending',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                // Hapus keranjang
                return db.collection('carts').doc(currentUser.uid).delete();
            }).then(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'Pesanan Berhasil!',
                    html: `
                        <p>Transfer ke <strong>${selectedPayment.toUpperCase()}</strong></p>
                        <h4>085710785244</h4>
                        <p>a.n. <strong>WebPro UMKM</strong></p>
                        <p>Total: <strong>Rp ${total.toLocaleString('id-ID')}</strong></p>
                    `,
                    confirmButtonText: 'OK'
                }).then(() => {
                    window.location.href = 'history.html';
                });
            }).catch((err) => {
                Swal.fire('Error', 'Gagal memproses: ' + err.message, 'error');
            });
        }
    </script>
</body>
</html>
