<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk - WebPro UMKM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f5f7fa; }
        .main-image { width: 100%; height: 400px; object-fit: cover; border-radius: 20px; cursor: pointer; }
        .thumbnail { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .thumbnail.active, .thumbnail:hover { border-color: #4e73df; }
        .review-card { border-left: 3px solid #4e73df; padding-left: 15px; margin-bottom: 15px; }
        .stars { color: #f6c23e; }
        .star-rating i { cursor: pointer; transition: 0.2s; }
        .star-rating i:hover { transform: scale(1.3); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-globe"></i> WebPro UMKM</a>
            <div class="ms-auto">
                <a href="cart.html" class="btn btn-light position-relative">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="badge bg-danger rounded-pill" id="cartBadge">0</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <!-- Images -->
            <div class="col-md-6 mb-4">
                <img src="https://via.placeholder.com/600x400?text=Loading..." class="main-image" id="mainImage" alt="Product">
                <div class="d-flex gap-2 mt-3" id="thumbnailContainer"></div>
            </div>

            <!-- Info -->
            <div class="col-md-6">
                <h1 id="productName">Loading...</h1>
                <div class="stars mb-2" id="productStars"></div>
                <p class="text-muted">Terjual: <span id="soldCount">0</span></p>
                <h3 class="text-primary fw-bold" id="productPrice">Rp 0</h3>
                <p id="originalPrice" class="text-decoration-line-through text-muted"></p>
                <span class="badge bg-danger" id="discountBadge" style="display:none;"></span>
                <hr>
                <h5>Deskripsi</h5>
                <p id="productDescription"></p>
                <hr>
                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-lg" onclick="addToCart()"><i class="fas fa-cart-plus"></i> Tambah ke Keranjang</button>
                    <button class="btn btn-success btn-lg" onclick="buyNow()"><i class="fas fa-bolt"></i> Beli Sekarang</button>
                </div>
            </div>
        </div>

        <!-- Reviews -->
        <div class="row mt-5">
            <div class="col-12">
                <h3>Ulasan</h3>
                <button class="btn btn-outline-primary mb-3" onclick="showReviewForm()"><i class="fas fa-star"></i> Tulis Ulasan</button>
                <div id="reviewForm" style="display:none;" class="card p-4 mb-4">
                    <h5>Beri Rating</h5>
                    <div class="star-rating mb-3" id="starRating">
                        <i class="far fa-star fa-2x" data-rating="1"></i>
                        <i class="far fa-star fa-2x" data-rating="2"></i>
                        <i class="far fa-star fa-2x" data-rating="3"></i>
                        <i class="far fa-star fa-2x" data-rating="4"></i>
                        <i class="far fa-star fa-2x" data-rating="5"></i>
                    </div>
                    <textarea class="form-control mb-3" id="reviewText" rows="3" placeholder="Tulis ulasan Anda..."></textarea>
                    <button class="btn btn-primary" onclick="submitReview()">Kirim Ulasan</button>
                </div>
                <div id="reviewsContainer"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let productData = null;
        let selectedRating = 0;

        if (!productId) window.location.href = 'index.html';

        async function loadProduct() {
            const doc = await db.collection('products').doc(productId).get();
            if (!doc.exists) { window.location.href = 'index.html'; return; }
            
            productData = { id: doc.id, ...doc.data() };
            
            document.getElementById('productName').textContent = productData.name;
            document.getElementById('productPrice').textContent = 'Rp ' + formatRupiah(productData.price);
            document.getElementById('productDescription').textContent = productData.description;
            document.getElementById('productStars').innerHTML = generateStars(productData.rating || 0) + ` (${productData.totalRatings || 0})`;
            document.getElementById('soldCount').textContent = productData.sold || 0;

            if (productData.discount) {
                document.getElementById('discountBadge').style.display = 'inline';
                document.getElementById('discountBadge').textContent = '-' + productData.discount + '%';
                document.getElementById('originalPrice').textContent = 'Rp ' + formatRupiah(productData.price);
                const discountPrice = productData.price - (productData.price * productData.discount / 100);
                document.getElementById('productPrice').textContent = 'Rp ' + formatRupiah(discountPrice);
            }

            if (productData.images && productData.images.length > 0) {
                document.getElementById('mainImage').src = productData.images[0];
                document.getElementById('thumbnailContainer').innerHTML = productData.images.map((img, i) => `
                    <img src="${img}" class="thumbnail ${i === 0 ? 'active' : ''}" onclick="changeImage('${img}', this)">
                `).join('');
            }

            loadReviews();
            updateCartBadge();
        }

        function changeImage(src, el) {
            document.getElementById('mainImage').src = src;
            document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        async function addToCart() {
            if (!auth.currentUser) { window.location.href = 'login.html'; return; }
            
            const cartRef = db.collection('carts').doc(auth.currentUser.uid);
            const cartDoc = await cartRef.get();
            let items = cartDoc.exists ? cartDoc.data().items || [] : [];
            const existing = items.find(i => i.productId === productId);
            
            if (existing) existing.quantity++;
            else items.push({ productId, name: productData.name, price: productData.price, discount: productData.discount || 0, image: productData.images?.[0] || '', quantity: 1 });
            
            await cartRef.set({ items, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
            updateCartBadge();
            Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Ditambahkan ke keranjang', timer: 1500, showConfirmButton: false });
        }

        function buyNow() { addToCart().then(() => window.location.href = 'checkout.html'); }

        async function updateCartBadge() {
            if (!auth.currentUser) return;
            const doc = await db.collection('carts').doc(auth.currentUser.uid).get();
            const count = doc.exists ? doc.data().items.reduce((s, i) => s + i.quantity, 0) : 0;
            document.getElementById('cartBadge').textContent = count;
        }

        // Reviews
        function showReviewForm() {
            if (!auth.currentUser) { window.location.href = 'login.html'; return; }
            document.getElementById('reviewForm').style.display = 'block';
        }

        document.querySelectorAll('#starRating i').forEach(star => {
            star.addEventListener('click', function() { selectedRating = parseInt(this.dataset.rating); updateStars(); });
            star.addEventListener('mouseover', function() { previewStars(parseInt(this.dataset.rating)); });
            star.addEventListener('mouseout', () => previewStars(selectedRating));
        });

        function updateStars() {
            document.querySelectorAll('#starRating i').forEach((star, i) => {
                star.className = i < selectedRating ? 'fas fa-star fa-2x text-warning' : 'far fa-star fa-2x';
            });
        }

        function previewStars(rating) {
            document.querySelectorAll('#starRating i').forEach((star, i) => {
                star.className = i < rating ? 'fas fa-star fa-2x text-warning' : 'far fa-star fa-2x';
            });
        }

        async function submitReview() {
            if (!auth.currentUser) return;
            const text = document.getElementById('reviewText').value.trim();
            if (!selectedRating || !text) { Swal.fire('Oops!', 'Isi rating dan ulasan', 'warning'); return; }

            // Check if already reviewed
            const existing = await db.collection('reviews')
                .where('userId', '==', auth.currentUser.uid)
                .where('productId', '==', productId).get();
            if (!existing.empty) { Swal.fire('Oops!', 'Anda sudah memberikan ulasan', 'warning'); return; }

            await db.collection('reviews').add({
                userId: auth.currentUser.uid,
                userName: auth.currentUser.displayName || 'User',
                productId: productId,
                rating: selectedRating,
                text: text,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // Update product rating
            const allReviews = await db.collection('reviews').where('productId', '==', productId).get();
            const totalRating = allReviews.docs.reduce((s, d) => s + d.data().rating, 0);
            const avgRating = totalRating / allReviews.size;
            await db.collection('products').doc(productId).update({
                rating: avgRating,
                totalRatings: allReviews.size
            });

            Swal.fire('Sukses!', 'Ulasan berhasil dikirim', 'success');
            document.getElementById('reviewForm').style.display = 'none';
            document.getElementById('reviewText').value = '';
            selectedRating = 0;
            updateStars();
            loadReviews();
            loadProduct();
        }

        async function loadReviews() {
            const snapshot = await db.collection('reviews')
                .where('productId', '==', productId)
                .orderBy('createdAt', 'desc').get();
            
            const container = document.getElementById('reviewsContainer');
            if (snapshot.empty) {
                container.innerHTML = '<p class="text-muted">Belum ada ulasan</p>';
                return;
            }

            container.innerHTML = snapshot.docs.map(doc => {
                const r = doc.data();
                return `
                    <div class="review-card">
                        <div class="stars">${generateStars(r.rating)}</div>
                        <p>${r.text}</p>
                        <small class="text-muted">${r.userName} - ${r.createdAt ? new Date(r.createdAt.seconds*1000).toLocaleDateString('id-ID') : '-'}</small>
                    </div>
                `;
            }).join('');
        }

        function generateStars(rating) {
            let s = '';
            for (let i = 1; i <= 5; i++) s += i <= rating ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>';
            return s;
        }

        function formatRupiah(n) { return new Intl.NumberFormat('id-ID').format(n); }

        loadProduct();
    </script>
</body>
</html>
