<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - WebPro UMKM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f5f7fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #4e73df 0%, #224abe 100%);
            padding-top: 20px;
        }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 5px 0; border-radius: 10px; transition: 0.3s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: white; background: rgba(255,255,255,0.1); }
        .sidebar .nav-link i { margin-right: 10px; }
        .dashboard-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: 0.3s;
            height: 100%;
        }
        .dashboard-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .stat-card {
            border: none;
            border-radius: 15px;
            padding: 25px;
            color: white;
            transition: 0.3s;
        }
        .stat-card:hover { transform: scale(1.05); }
        .stat-card i { font-size: 2.5rem; opacity: 0.5; }
        @media (max-width: 768px) { .sidebar { min-height: auto; } }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 sidebar">
                <div class="text-center mb-4">
                    <i class="fas fa-globe fa-2x text-white"></i>
                    <h5 class="text-white mt-2">WebPro UMKM</h5>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link active" href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-store"></i> Belanja</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html"><i class="fas fa-shopping-cart"></i> Keranjang <span class="badge bg-danger" id="cartBadgeSidebar">0</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="history.html"><i class="fas fa-history"></i> Riwayat</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html"><i class="fas fa-user"></i> Profil</a></li>
                    <li class="nav-item" id="adminMenu" style="display:none;"><a class="nav-link text-warning" href="admin.html"><i class="fas fa-crown"></i> Admin Panel</a></li>
                    <li class="nav-item mt-4"><a class="nav-link text-danger" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 col-lg-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Dashboard</h2>
                    <span class="text-muted" id="currentTime"></span>
                </div>

                <!-- User Welcome -->
                <div class="alert alert-info rounded-3" id="welcomeMessage">
                    <i class="fas fa-spinner fa-spin"></i> Loading...
                </div>

                <!-- Stats -->
                <div class="row g-3 mb-4">
                    <div class="col-6 col-md-3">
                        <div class="stat-card bg-primary">
                            <div class="d-flex justify-content-between">
                                <div><h6>Pesanan</h6><h2 id="totalOrders">0</h2></div>
                                <i class="fas fa-shopping-bag"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card bg-success">
                            <div class="d-flex justify-content-between">
                                <div><h6>Total Belanja</h6><h5 id="totalSpent">Rp 0</h5></div>
                                <i class="fas fa-money-bill-wave"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card bg-warning">
                            <div class="d-flex justify-content-between">
                                <div><h6>Keranjang</h6><h2 id="cartCount">0</h2></div>
                                <i class="fas fa-shopping-cart"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card bg-info">
                            <div class="d-flex justify-content-between">
                                <div><h6>Review</h6><h2 id="reviewCount">0</h2></div>
                                <i class="fas fa-star"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Links -->
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="card dashboard-card p-4">
                            <h5><i class="fas fa-shopping-cart text-primary"></i> Pesanan Terbaru</h5>
                            <div id="recentOrders"><p class="text-muted">Belum ada pesanan</p></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card dashboard-card p-4">
                            <h5><i class="fas fa-star text-warning"></i> Produk Terpopuler</h5>
                            <div id="popularProducts"><p class="text-muted">Loading...</p></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script>
        let currentUser = null;

        // Update time
        function updateTime() {
            document.getElementById('currentTime').textContent = new Date().toLocaleString('id-ID');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Auth check
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;
            document.getElementById('welcomeMessage').innerHTML = 
                `<i class="fas fa-user-circle"></i> Selamat datang, <strong>${user.displayName || 'User'}</strong> | ${user.email}`;

            // Check admin
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists && userDoc.data().role === 'admin') {
                document.getElementById('adminMenu').style.display = 'block';
            }

            loadStats();
            loadRecentOrders();
            updateCartBadge();
        });

        async function loadStats() {
            if (!currentUser) return;
            
            // Orders count
            const ordersSnap = await db.collection('orders').where('userId', '==', currentUser.uid).get();
            document.getElementById('totalOrders').textContent = ordersSnap.size;
            
            // Total spent
            let totalSpent = 0;
            ordersSnap.forEach(doc => {
                if (doc.data().status === 'paid' || doc.data().status === 'completed') {
                    totalSpent += doc.data().totalPrice || 0;
                }
            });
            document.getElementById('totalSpent').textContent = 'Rp ' + totalSpent.toLocaleString('id-ID');

            // Cart count
            const cartDoc = await db.collection('carts').doc(currentUser.uid).get();
            const cartItems = cartDoc.exists ? cartDoc.data().items || [] : [];
            document.getElementById('cartCount').textContent = cartItems.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('cartBadgeSidebar').textContent = cartItems.reduce((s, i) => s + i.quantity, 0);
        }

        async function loadRecentOrders() {
            if (!currentUser) return;
            const snapshot = await db.collection('orders')
                .where('userId', '==', currentUser.uid)
                .orderBy('createdAt', 'desc')
                .limit(3)
                .get();

            const container = document.getElementById('recentOrders');
            if (snapshot.empty) {
                container.innerHTML = '<p class="text-muted">Belum ada pesanan</p>';
                return;
            }

            container.innerHTML = snapshot.docs.map(doc => {
                const order = doc.data();
                const statusColor = order.status === 'paid' ? 'success' : order.status === 'pending' ? 'warning' : 'info';
                return `
                    <div class="d-flex justify-content-between align-items-center mb-2 p-2 border-bottom">
                        <div>
                            <strong>${order.productName || 'Pesanan #' + doc.id.substring(0,8)}</strong><br>
                            <small class="text-muted">${order.createdAt ? new Date(order.createdAt.seconds*1000).toLocaleDateString('id-ID') : '-'}</small>
                        </div>
                        <span class="badge bg-${statusColor}">${order.status}</span>
                    </div>
                `;
            }).join('');
        }

        async function updateCartBadge() {
            if (!currentUser) return;
            const cartDoc = await db.collection('carts').doc(currentUser.uid).get();
            const count = cartDoc.exists ? cartDoc.data().items.reduce((s, i) => s + i.quantity, 0) : 0;
            document.getElementById('cartBadgeSidebar').textContent = count;
        }

        function logout() {
            auth.signOut().then(() => window.location.href = 'login.html');
        }
    </script>
</body>
</html>
